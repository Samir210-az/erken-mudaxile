<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#2f8f83" />
<title>AN Erkən Müdaxilə & İnkişaf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f3ec;
    --ink:#2a2926;
    --muted:#6f6a61;
    --line:#e6e0d4;
    --card:#ffffff;
    --brand:#2f8f83;
    --brand-dark:#236b62;
    --brand-soft:#e3f0ed;
    --accent:#e0975a;
    --danger:#c0533f;
    --ok:#2f8f83;
    --radius:20px;
    --shadow:0 10px 30px rgba(35,107,98,.10), 0 2px 8px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Nunito",system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    background-image:
      radial-gradient(120% 80% at 85% -10%, #e7f1ee 0%, rgba(231,241,238,0) 55%),
      radial-gradient(100% 70% at -10% 110%, #f4e7d8 0%, rgba(244,231,216,0) 55%);
    background-attachment:fixed;
    min-height:100dvh;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:460px;margin:0 auto;
    padding:max(20px,env(safe-area-inset-top)) 18px calc(28px + env(safe-area-inset-bottom));
    min-height:100dvh;display:flex;flex-direction:column;
  }
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 18px;}
  .lang{display:flex;gap:4px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px;}
  .lang button{
    border:0;background:transparent;font-family:inherit;font-weight:700;font-size:13px;
    color:var(--muted);padding:6px 12px;border-radius:999px;cursor:pointer;
  }
  .lang button[aria-pressed="true"]{background:var(--brand);color:#fff;}

  .brand{display:flex;align-items:center;gap:11px;}
  .mark{width:42px;height:42px;flex:0 0 42px;}
  .brand-name{font-weight:900;font-size:17px;letter-spacing:-.2px;line-height:1.1;}
  .brand-name small{display:block;font-weight:700;font-size:11px;color:var(--brand-dark);letter-spacing:.4px;text-transform:uppercase;}

  .hero{padding:8px 2px 22px;animation:rise .5s ease both;}
  .hero h1{font-size:26px;line-height:1.18;margin:0 0 8px;letter-spacing:-.5px;}
  .hero p{margin:0;color:var(--muted);font-size:15px;font-weight:600;}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px 16px 20px;animation:rise .5s .06s ease both;
  }
  .tabs{display:flex;gap:6px;background:var(--bg);border-radius:14px;padding:5px;margin-bottom:16px;}
  .tabs button{
    flex:1;border:0;background:transparent;font-family:inherit;font-weight:800;font-size:14px;
    color:var(--muted);padding:11px 8px;border-radius:10px;cursor:pointer;transition:.18s;
  }
  .tabs button[aria-selected="true"]{background:#fff;color:var(--brand-dark);box-shadow:0 1px 4px rgba(0,0,0,.06);}

  .seg{display:flex;gap:18px;margin:0 2px 14px;}
  .seg label{display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px;color:var(--muted);cursor:pointer;}
  .seg input{accent-color:var(--brand);width:18px;height:18px;}
  .seg input:checked + span{color:var(--ink);}

  label.field{display:block;margin-bottom:13px;}
  label.field > span{display:block;font-weight:700;font-size:13px;margin:0 2px 6px;color:var(--ink);}
  input[type=text],input[type=email],input[type=password],input[type=tel]{
    width:100%;font-family:inherit;font-size:16px;font-weight:600;color:var(--ink);
    padding:13px 14px;border:1.5px solid var(--line);border-radius:13px;background:#fff;transition:.15s;
  }
  input:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft);}
  .hidden{display:none !important;}

  .btn{
    width:100%;border:0;font-family:inherit;font-weight:800;font-size:16px;color:#fff;
    background:var(--brand);padding:15px;border-radius:14px;cursor:pointer;margin-top:4px;
    transition:transform .08s ease, background .15s ease;
  }
  .btn:active{transform:scale(.985);}
  .btn:disabled{opacity:.55;cursor:default;}
  .btn.secondary{background:#fff;color:var(--brand-dark);border:1.5px solid var(--line);}

  .msg{margin:14px 2px 0;font-size:14px;font-weight:700;border-radius:12px;padding:11px 13px;display:none;}
  .msg.show{display:block;animation:rise .25s ease both;}
  .msg.err{background:#faeae6;color:var(--danger);}
  .msg.ok{background:var(--brand-soft);color:var(--brand-dark);}

  .welcome{text-align:center;padding:8px 4px 4px;}
  .welcome .avatar{width:64px;height:64px;margin:0 auto 14px;border-radius:50%;background:var(--brand-soft);display:flex;align-items:center;justify-content:center;}
  .welcome h2{margin:0 0 6px;font-size:22px;}
  .badge{display:inline-block;background:var(--brand-soft);color:var(--brand-dark);font-weight:800;font-size:13px;padding:5px 12px;border-radius:999px;margin-bottom:16px;}
  .welcome .note{color:var(--muted);font-weight:600;font-size:14px;margin:0 0 18px;}

  .foot{margin-top:auto;padding-top:26px;text-align:center;color:var(--muted);font-size:12.5px;font-weight:600;}
  .foot a{color:var(--brand-dark);text-decoration:none;font-weight:800;}
  .foot .org{display:block;margin-top:4px;}

  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <svg class="mark" viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <rect width="48" height="48" rx="14" fill="#e3f0ed"/>
        <path d="M24 36c0-7 0-10-4.5-13.5C16 19.8 13 19.5 13 19.5s.2 3.2 3 6c3 3 8 3.5 8 10.5z" fill="#2f8f83"/>
        <path d="M24 33c0-6 0-8.5 4-11.5 3-2.2 6-2.5 6-2.5s-.2 3-3 5.5c-2.7 2.5-7 3-7 8.5z" fill="#7bbcae"/>
        <path d="M24 36V21" stroke="#236b62" stroke-width="2.4" stroke-linecap="round"/>
        <circle cx="24" cy="14.5" r="3.6" fill="#e0975a"/>
      </svg>
      <div class="brand-name">AN<small>Müdaxilə & İnkişaf</small></div>
    </div>
    <div class="lang" role="group" aria-label="Dil / Язык">
      <button data-lang="az" aria-pressed="true">AZ</button>
      <button data-lang="ru" aria-pressed="false">RU</button>
    </div>
  </div>

  <div class="hero">
    <h1 data-i18n="heroTitle">Erkən müdaxilə fərq yaradır</h1>
    <p data-i18n="heroSub">Xüsusi qayğıya ehtiyacı olan uşaqlar üçün dəstək platforması.</p>
  </div>

  <!-- AUTH -->
  <div class="card" id="authCard">
    <div class="tabs" role="tablist">
      <button id="tabEmail" role="tab" aria-selected="true" data-i18n="tabEmail">E-poçt</button>
      <button id="tabPhone" role="tab" aria-selected="false" data-i18n="tabPhone">Telefon</button>
    </div>

    <!-- E-poçt paneli -->
    <div id="panelEmail">
      <div class="seg">
        <label><input type="radio" name="emode" value="login" checked><span data-i18n="login">Giriş</span></label>
        <label><input type="radio" name="emode" value="register"><span data-i18n="register">Qeydiyyat</span></label>
      </div>
      <label class="field hidden" id="nameField">
        <span data-i18n="name">Ad, Soyad</span>
        <input type="text" id="name" autocomplete="name" />
      </label>
      <label class="field">
        <span data-i18n="email">E-poçt</span>
        <input type="email" id="email" inputmode="email" autocomplete="email" autocapitalize="off" />
      </label>
      <label class="field">
        <span data-i18n="password">Parol</span>
        <input type="password" id="password" autocomplete="current-password" />
      </label>
      <button class="btn" id="emailSubmit" data-i18n="login">Giriş</button>
    </div>

    <!-- Telefon paneli -->
    <div id="panelPhone" class="hidden">
      <label class="field">
        <span data-i18n="phone">Telefon nömrəsi</span>
        <input type="tel" id="phone" inputmode="tel" placeholder="+994 50 123 45 67" autocomplete="tel" />
      </label>
      <button class="btn" id="sendCode" data-i18n="sendCode">Kod göndər</button>

      <div id="codeStep" class="hidden">
        <label class="field" style="margin-top:13px;">
          <span data-i18n="smsCode">SMS kodu</span>
          <input type="text" id="smsCode" inputmode="numeric" autocomplete="one-time-code" />
        </label>
        <button class="btn" id="confirmCode" data-i18n="confirm">Təsdiqlə</button>
      </div>
    </div>

    <div class="msg" id="msg" role="status" aria-live="polite"></div>
    <div id="recaptcha-container"></div>
  </div>

  <!-- DAXİL OLDUQDAN SONRA -->
  <div class="card hidden" id="loggedCard">
    <div class="welcome">
      <div class="avatar">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M5 20c0-3.3 3.1-5 7-5s7 1.7 7 5" stroke="#2f8f83" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="8" r="4" stroke="#2f8f83" stroke-width="2"/></svg>
      </div>
      <h2><span data-i18n="welcome">Xoş gəldiniz</span><span id="who"></span></h2>
      <div class="badge"><span data-i18n="role">Rol</span>: <span id="role">—</span></div>
      <p class="note" data-i18n="dashSoon">Panel növbəti addımda hazırlanır.</p>
      <button class="btn secondary" id="logout" data-i18n="logout">Çıxış</button>
    </div>
  </div>

  <div class="foot">
    <span data-i18n="madeBy">Hazırladı</span> <a href="https://instagram.com/s_akhundoff" target="_blank" rel="noopener">@s_akhundoff</a>
    <span class="org">AN Psixoloji Dəstək və Reabilitasiya Mərkəzi</span>
  </div>

</div>

<script type="module">
import {
  registerWithEmail, loginWithEmail,
  setupRecaptcha, sendPhoneCode, confirmPhoneCode,
  logout, onUser
} from "./auth.js";

// ── Dil (AZ / RU) ────────────────────────────────────────────────
const I18N = {
  az:{
    heroTitle:"Erkən müdaxilə fərq yaradır", heroSub:"Xüsusi qayğıya ehtiyacı olan uşaqlar üçün dəstək platforması.",
    tabEmail:"E-poçt", tabPhone:"Telefon", login:"Giriş", register:"Qeydiyyat",
    name:"Ad, Soyad", email:"E-poçt", password:"Parol", phone:"Telefon nömrəsi",
    sendCode:"Kod göndər", smsCode:"SMS kodu", confirm:"Təsdiqlə",
    welcome:"Xoş gəldiniz", role:"Rol", dashSoon:"Panel növbəti addımda hazırlanır.",
    logout:"Çıxış", madeBy:"Hazırladı",
    rolValideyn:"Valideyn", rolTerapevt:"Terapevt", rolAdmin:"Admin",
    eFill:"E-poçt və parolu doldurun.", ePhone:"Düzgün nömrə daxil edin (+994…).",
    eCode:"Kodu daxil edin.", working:"Gözləyin…", codeSent:"Kod göndərildi.",
    eGeneric:"Xəta baş verdi. Yenidən cəhd edin."
  },
  ru:{
    heroTitle:"Раннее вмешательство имеет значение", heroSub:"Платформа поддержки для детей с особыми потребностями.",
    tabEmail:"Эл. почта", tabPhone:"Телефон", login:"Вход", register:"Регистрация",
    name:"Имя, Фамилия", email:"Эл. почта", password:"Пароль", phone:"Номер телефона",
    sendCode:"Отправить код", smsCode:"SMS-код", confirm:"Подтвердить",
    welcome:"Добро пожаловать", role:"Роль", dashSoon:"Панель готовится на следующем шаге.",
    logout:"Выход", madeBy:"Автор",
    rolValideyn:"Родитель", rolTerapevt:"Терапевт", rolAdmin:"Администратор",
    eFill:"Заполните почту и пароль.", ePhone:"Введите корректный номер (+994…).",
    eCode:"Введите код.", working:"Подождите…", codeSent:"Код отправлен.",
    eGeneric:"Произошла ошибка. Попробуйте снова."
  }
};
let lang = "az";
const t = k => (I18N[lang][k] ?? k);
function applyLang(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  syncEmailButton();
  document.querySelectorAll(".lang button").forEach(b=>b.setAttribute("aria-pressed", String(b.dataset.lang===lang)));
}
document.querySelectorAll(".lang button").forEach(b=>{
  b.addEventListener("click", ()=>{ lang=b.dataset.lang; applyLang(); });
});

// ── Mesaj köməkçisi ──────────────────────────────────────────────
const msgEl = document.getElementById("msg");
function show(kind, text){ msgEl.className = "msg show "+kind; msgEl.textContent = text; }
function clearMsg(){ msgEl.className = "msg"; msgEl.textContent=""; }

// ── Tab: E-poçt / Telefon ────────────────────────────────────────
const tabEmail=document.getElementById("tabEmail"), tabPhone=document.getElementById("tabPhone");
const panelEmail=document.getElementById("panelEmail"), panelPhone=document.getElementById("panelPhone");
function selectTab(which){
  const isEmail = which==="email";
  tabEmail.setAttribute("aria-selected", String(isEmail));
  tabPhone.setAttribute("aria-selected", String(!isEmail));
  panelEmail.classList.toggle("hidden", !isEmail);
  panelPhone.classList.toggle("hidden", isEmail);
  clearMsg();
}
tabEmail.onclick=()=>selectTab("email");
tabPhone.onclick=()=>selectTab("phone");

// ── E-poçt: Giriş / Qeydiyyat ────────────────────────────────────
const nameField=document.getElementById("nameField");
const emailBtn=document.getElementById("emailSubmit");
function currentEmode(){ return document.querySelector('input[name="emode"]:checked').value; }
function syncEmailButton(){
  const reg = currentEmode()==="register";
  nameField.classList.toggle("hidden", !reg);
  emailBtn.textContent = reg ? t("register") : t("login");
  document.getElementById("password").setAttribute("autocomplete", reg?"new-password":"current-password");
}
document.querySelectorAll('input[name="emode"]').forEach(r=>r.addEventListener("change", ()=>{clearMsg();syncEmailButton();}));

emailBtn.addEventListener("click", async ()=>{
  const email=document.getElementById("email").value.trim();
  const pass=document.getElementById("password").value;
  const ad=document.getElementById("name").value.trim();
  if(!email || !pass){ return show("err", t("eFill")); }
  emailBtn.disabled=true; show("ok", t("working"));
  try{
    if(currentEmode()==="register") await registerWithEmail(email, pass, ad);
    else await loginWithEmail(email, pass);
    clearMsg();
  }catch(e){ show("err", e?.message || t("eGeneric")); }
  finally{ emailBtn.disabled=false; }
});

// ── Telefon (SMS) ────────────────────────────────────────────────
let verifier=null, confirmation=null;
const sendBtn=document.getElementById("sendCode");
const codeStep=document.getElementById("codeStep");
const confirmBtn=document.getElementById("confirmCode");

sendBtn.addEventListener("click", async ()=>{
  const phone=document.getElementById("phone").value.replace(/\s+/g,"");
  if(!/^\+\d{9,15}$/.test(phone)){ return show("err", t("ePhone")); }
  sendBtn.disabled=true; show("ok", t("working"));
  try{
    if(!verifier) verifier = setupRecaptcha("recaptcha-container");
    confirmation = await sendPhoneCode(phone, verifier);
    codeStep.classList.remove("hidden");
    show("ok", t("codeSent"));
  }catch(e){ show("err", e?.message || t("eGeneric")); }
  finally{ sendBtn.disabled=false; }
});

confirmBtn.addEventListener("click", async ()=>{
  const code=document.getElementById("smsCode").value.trim();
  if(!code){ return show("err", t("eCode")); }
  confirmBtn.disabled=true; show("ok", t("working"));
  try{
    await confirmPhoneCode(confirmation, code);
    clearMsg();
  }catch(e){ show("err", e?.message || t("eGeneric")); }
  finally{ confirmBtn.disabled=false; }
});

// ── Auth vəziyyəti ───────────────────────────────────────────────
const authCard=document.getElementById("authCard");
const loggedCard=document.getElementById("loggedCard");
const rolMap={valideyn:"rolValideyn", terapevt:"rolTerapevt", admin:"rolAdmin"};

onUser((user, rol)=>{
  if(user){
    authCard.classList.add("hidden");
    loggedCard.classList.remove("hidden");
    const ad = user.displayName || user.email || user.phoneNumber || "";
    document.getElementById("who").textContent = ad ? ", "+ad.split("@")[0] : "";
    document.getElementById("role").textContent = t(rolMap[rol] || "rolValideyn");
  }else{
    loggedCard.classList.add("hidden");
    authCard.classList.remove("hidden");
  }
});

document.getElementById("logout").addEventListener("click", ()=>logout());

applyLang();
</script>
</body>
</html>
